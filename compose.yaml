services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: studentdb
    ports:
      - "5432:5432"
    # ДОДАЄМО ЦЕ:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d studentdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Lab7.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=studentdb;Username=user;Password=password
    depends_on:
      db:
        condition: service_healthy # ТЕПЕР API ЧЕКАТИМЕ ГОТОВНОСТІ БАЗИ