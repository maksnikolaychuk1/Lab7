services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: studentdb
    ports:
      - "5432:5432"

  api:
    build:
      context: .
      dockerfile: Lab7.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Database=studentdb;Username=user;Password=password
    depends_on:
      - db

  k6:
    image: grafana/k6:latest
    volumes:
      - ./Lab7.Api/k6-scripts:/scripts
    depends_on:
      - api