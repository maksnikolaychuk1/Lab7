name: k6 Performance Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      test-type:
        description: 'Тип тесту (smoke, load, stress)'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - load
          - stress

jobs:
  k6:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Start Infrastructure via Docker Compose
        # Використовуємо твій compose.yaml з кореня
        run: docker-compose up -d --build

      - name: Wait for API readiness
        run: |
          echo "Чекаємо на готовність API..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/api/students > /dev/null 2>&1; then
              echo "API готовий!"
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Determine test type
        id: test-type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.test-type }}" >> "$GITHUB_OUTPUT"
          else
            echo "type=smoke" >> "$GITHUB_OUTPUT"
          fi

      - name: Run k6 test
        # Припускаємо, що папка scripts лежить у корені
        run: k6 run -e BASE_URL=http://localhost:5000 scripts/${{ steps.test-type.outputs.type }}.js --summary-export=results.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: results.json